<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Room Register</title>
    <style>
        /* Basic styling - you can customize this to match your department */
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { padding: 0.75rem 1.5rem; background-color: #0056b3; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #004494; }
    </style>
    <style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6; /* Soft clinical background */
    padding: 20px;
    color: #333;
  }
  .header {
    background-color: #004a99; /* Professional deep blue */
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .container {
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* Ensures padding doesn't affect width */
  }
  button {
    background-color: #004a99;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background-color: #003366;
  }
</style>
</head>
<div class="header">
  <h1>King Faisal Hospital Rwanda</h1>
  <h2>Urusaro Department - Clinical Room Register</h2>
</div>

<div class="container">
  <!-- Place your form and table code here -->
</div>
<body>

    <h2>Book a Patient Room</h2>
    
    <form id="bookingForm">
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Service</label>
            <input type="text" name="service" required>
        </div>
        <div class="form-group">
            <label>Type of Room</label>
            <select name="roomType" required>
                <option value="Standard">Standard</option>
                <option value="ICU">ICU</option>
                <option value="Private">Private</option>
            </select>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" required>
        </div>
        <div class="form-group">
            <label>Booker (Your Name)</label>
            <input type="text" name="booker" required>
        </div>
        <div class="form-group">
            <label>Observation</label>
            <textarea name="observation" rows="3"></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Submit Booking</button>
    </form>
    <hr>
<h3>Current Room Bookings (Read-Only)</h3>
<input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 Search for patient name..." style="width: 100%; padding: 10px; margin-bottom: 10px;">
<table id="bookingsTable" border="1" style="width:100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th>Date</th><th>Name</th><th>Service</th><th>Room</th>
            <th>Phone</th><th>Booker</th><th>Observation</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

    <script>
        const form = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        
        // 🚨 CRITICAL: Paste your actual Google Web App URL inside the quotes below!
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwlsZwKW8g8y8ARStSivQ4ernhKPK15DxJiGjv3-GLJ4pZo4UfXEgA2XVobafRQCoQ8JQ/exec'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.innerText = "Submitting...";
            submitBtn.disabled = true;

            // This line packages the data in the exact format Google Apps Script prefers
            const data = new URLSearchParams(new FormData(form));

            fetch(scriptURL, { 
                method: 'POST', 
                body: data
            })
            .then(response => {
                alert('Success! Patient room booked securely.');
                form.reset();
                submitBtn.innerText = "Submit Booking";
                submitBtn.disabled = false;
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('There was an error. Please check your internet connection or URL.');
                submitBtn.innerText = "Submit Booking";
                submitBtn.disabled = false;
            });
        });
        function loadBookings() {
    fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                for(let i = 0; i < 7; i++) {
                    const td = document.createElement('td');
                    td.innerText = row[i] || '';
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            });
        });
}
window.onload = function loadBookings() {
    const tableBody = document.getElementById('tableBody');
    
    fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            tableBody.innerHTML = ''; // Clear previous
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7">No bookings found.</td></tr>';
                return;
            }

            data.forEach(row => {
                const tr = document.createElement('tr');
                // Ensure we only process the 7 columns we defined
                for(let i = 0; i < 7; i++) {
                    const td = document.createElement('td');
                    td.style.border = "1px solid #ccc";
                    td.style.padding = "8px";
                    td.innerText = row[i] || '-'; // Shows '-' if cell is empty
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            });
        })
        .catch(err => {
            console.error("Fetch Error:", err);
            tableBody.innerHTML = '<tr><td colspan="7">Error loading data.</td></tr>';
        });
};
function searchTable() {
    const input = document.getElementById("searchInput");
    const filter = input.value.toUpperCase();
    const table = document.getElementById("bookingsTable");
    const tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        const td = tr[i].getElementsByTagName("td")[1]; // Column 1 is "Name"
        if (td) {
            const txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
}
    </script>
    <button onclick="loadBookings()">Refresh Booking List</button>
</body>
</html>
